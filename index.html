<!DOCTYPE html>
<html>
<head>
  <title>Advanced Blacklist Checker</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
    textarea { width:300px; height:120px; padding:10px; }
    button { padding:10px 20px; margin-top:10px; }
    .good { color:lightgreen; }
    .bad { color:red; }
  </style>
</head>
<body>

<h1>🔎 Multi Blacklist Checker</h1>

<p>Enter IPs / Domains (one per line):</p>
<textarea id="input"></textarea><br>
<button onclick="checkAll()">Check All</button>

<h2>Results:</h2>
<div id="results"></div>

<h2>Stats:</h2>
<p id="stats"></p>

<script>
const blacklist = [
  "192.168.1.1",
  "badsite.com",
  "123.45.67.89",
  "malware-site.net"
];

function checkAll() {
  const input = document.getElementById("input").value;
  const lines = input.split("\n");
  let resultsHTML = "";
  
  let listed = 0;
  let clean = 0;

  lines.forEach(item => {
    const value = item.trim();
    if (!value) return;

    if (blacklist.includes(value)) {
      resultsHTML += `<p class="bad">${value} → ❌ Listed</p>`;
      listed++;
    } else {
      resultsHTML += `<p class="good">${value} → ✅ Clean</p>`;
      clean++;
    }
  });

  document.getElementById("results").innerHTML = resultsHTML;
  document.getElementById("stats").innerHTML =
    `❌ Listed: ${listed} | ✅ Clean: ${clean}`;
}
</script>

</body>
</html>
