<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blacklist Checker</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }
    input {
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
    }
    button {
      padding: 10px 20px;
      margin-left: 10px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    .bad { color: red; }
    .good { color: lightgreen; }
  </style>
</head>
<body>

  <h1>🔎 Blacklist Checker</h1>

  <input type="text" id="input" placeholder="Enter IP or Domain">
  <button onclick="check()">Check</button>

  <p id="result"></p>

  <script>
    // Blacklist (تقدر تزيد فيها)
    const blacklist = [
      "192.168.1.1",
      "123.45.67.89",
      "badsite.com",
      "malware-site.net"
    ];

    function isValidIP(ip) {
      return /^(\\d{1,3}\\.){3}\\d{1,3}$/.test(ip);
    }

    function isValidDomain(domain) {
      return /^[a-zA-Z0-9.-]+\\.[a-zA-Z]{2,}$/.test(domain);
    }

    function check() {
      const value = document.getElementById("input").value.trim();
      const result = document.getElementById("result");

      if (!isValidIP(value) && !isValidDomain(value)) {
        result.innerHTML = "⚠️ Invalid IP or Domain";
        result.className = "bad";
        return;
      }

      if (blacklist.includes(value)) {
        result.innerHTML = "❌ Blacklisted";
        result.className = "bad";
      } else {
        result.innerHTML = "✅ Safe";
        result.className = "good";
      }
    }
  </script>

</body>
</html>
